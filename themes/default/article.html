<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/all.min.css" rel="stylesheet">
    <link href="/files/custom-default-bootstrap.css" rel="stylesheet">
    <link href="/files/xytext.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row m-0">
            <div class="col-lg-9">
                <article class="article-container flex-1 w-full" style="margin-left: 0; margin-right: 0; max-width: 100%; width: 100%;">           
					<div class="main-box my-4">
                    <div class="text-center pb-3 border-bottom mb-4" style="padding-top: 15px;">
                        <h3 class="fw-bold mb-3" id="article-title" style="font-size: 1.5rem; color: #1e293b;">
                            正在加载文章...
                        </h3>
                        <div class="text-muted small d-flex justify-content-center align-items-center gap-3">
                            <span><i class="fas fa-folder-open me-1"></i><span id="article-category">加载中...</span></span>
                            <span><i class="far fa-clock me-1"></i><span id="article-time">----年--月--日</span></span>
                            <span id="article-views-wrap" style="display:none;"><i class="far fa-eye me-1"></i><span id="article-views">0</span></span>
                        </div>
                    </div>

                    <div id="article-content" class="px-2 px-md-3 pb-3">
                        <p class="text-muted text-center py-5">正在加载内容...</p>
                    </div>

                    <div class="pt-3 border-top text-center mt-4">
                        <a class="btn btn-outline-secondary btn-sm" href="/articles">
                            <i class="fas fa-arrow-left me-1"></i> 返回文章列表
                        </a>
                    </div>
                </div>
				</article>
			</div> 
			<div class="col-lg-3 d-none d-lg-block">
				<div class="card border-0 shadow-sm sticky-top" style="top: 80px; margin-top: 30px; border-radius: 0.75rem;">
					<div class="card-body">
						<h5 class="card-title mb-3 fw-bold" style="font-size: 1rem; color: #1e293b; border-bottom: 1px solid #eee; padding-bottom: 10px;">
							文章分类
						</h5>
						<div class="list-group list-group-flush" id="sidebar-categories">
							<div class="text-muted small py-2">加载中...</div>
						</div>
					</div>
				</div>
			</div>
     </div> 
    <script src="/assets/jquery-3.6.0.min.js"></script>
    <script src="/assets/bootstrap.bundle.min.js"></script>
    <script src="/files/header.js"></script>
    <script src="/files/footer.js"></script>
    <script>
        $(document).ready(function() {
            // 1. 初始化页头 (主动获取后台配置)
            initGlobalConfigAndHeader();
            if (typeof renderFooter === 'function') {
                renderFooter();
            }
            // 3. 加载文章内容
            loadArticle();
            loadSidebarCategories();
        });

        // 新增：主动获取全局配置并渲染 Header
        function initGlobalConfigAndHeader() {
            $.ajax({
                url: '/api/shop/config',
                method: 'GET',
                success: function(res) {
                    // 解析 API 返回的配置
                    let config = {};
                    if (res && res.data) config = res.data; // 适配不同 API 结构
                    else config = res || {};

                    const siteName = config.site_name || '我的商店';
                    const siteLogo = config.site_logo || '';
                    const showName = config.show_site_name;

                    // 调用 header.js 中的渲染函数
                    if (typeof renderHeader === 'function') {
                        renderHeader(siteName, siteLogo, showName);
                    }
                },
                error: function() {
                    // 获取失败时的兜底显示
                    if (typeof renderHeader === 'function') {
                        renderHeader('我的商店');
                    }
                }
            });
        }

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                showError('参数错误，未找到文章 ID');
                return;
            }

            try {
                const res = await fetch(`/api/shop/article/get?id=${id}`);
                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }
                renderArticle(data);

            } catch (e) {
                showError('网络错误，无法加载文章');
                console.error(e);
            }
        }

        function renderArticle(data) {
            document.title = data.title + ' - 资讯中心';
            $('#article-title').text(data.title);

            const catName = data.category_name || '默认分类';
            $('#article-category').text(catName);
            
            const date = new Date(data.created_at * 1000);
            const dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            $('#article-time').text(dateStr);

            $('#article-views').text(data.view_count || 0);
            $('#article-views-wrap').show();

            $('#article-content').html(data.content);

            // 移除正文内容中的 H1 标题，避免重复
            $('#article-content h1').remove();

            $('#article-content img').each(function() {
                $(this).removeAttr('width').removeAttr('height').css({
                    'width': '',
                    'height': '',
                    'max-width': '100%'
                });
            });
        }

        function showError(msg) {
            $('#article-title').text('提示');
            $('#article-content').html(`<div class="alert alert-danger my-4">${msg}</div>`);
            $('#article-category').text('错误');
            $('#article-time').text('');
        }
        // 新增：加载侧边栏分类数据
        function loadSidebarCategories() {
            $.ajax({
                url: '/api/shop/article/categories',
                method: 'GET',
                success: function(res) {
                    const box = $('#sidebar-categories');
                    box.empty();
                    if(res && Array.isArray(res) && res.length > 0) {
                        res.forEach(c => {
                            // 这里链接指向文章列表页
                            box.append(`
                                <a href="/articles?category_id=${c.id}" class="list-group-item list-group-item-action border-0 px-0 py-2 text-secondary" style="font-size: 0.95rem;">
                                    <i class="fas fa-angle-right me-2 text-muted small"></i>${c.name}
                                    
                                </a>
                            `);
                        });
                    } else {
                        box.append('<div class="text-muted small">暂无分类</div>');
                    }
                }
            });
        }
    </script>
</body>
</html>
