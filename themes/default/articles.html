<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章教程</title>
    
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/all.min.css" rel="stylesheet">
    <link href="/files/custom-default-bootstrap.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        /* === 移植并优化后的样式 === */
        
        /* 1. 图片样式 */
        .avatar-sm {
            width: 220px;
            height: 138px;
            border-radius: 0.9rem;
            object-fit: cover;
            /* 关键修改：移除 float，改用 flex 布局控制位置 */
            display: block;
            transition: transform 0.3s ease;
        }
        /* 鼠标悬停微效 */
        .article-item:hover .avatar-sm {
            transform: scale(1.02);
        }

        /* 2. 标题样式 */
        .blog-post-title {
            font-size: 1.1rem;
            font-weight: 600; /* 加粗一点更清晰 */
            text-decoration: none;
            color: #333;
            display: block;
            margin-bottom: 6px;
            line-height: 1.4;
            transition: color 0.2s;
        }
        .blog-post-title:hover {
            color: var(--luna-primary-blue);
        }

        /* 3. 元数据样式 (日期/阅读量) */
        .blog-post-meta {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 10px;
        }

        /* 4. 摘要样式 */
        .article-summary {
            font-size: 14px;
            line-height: 1.7;
            color: #666;
            margin-bottom: 0;
            /* 多行省略号，防止太长 */
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3; /* 最多显示3行 */
            overflow: hidden;
        }

        /* 5. 分类导航样式 */
        .category-nav-link {
            padding: 8px 15px;
            color: #6c757d;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
            margin-right: 5px;
            font-size: 15px;
        }
        .category-nav-link:hover {
            color: #333;
            background-color: #f8f9fa;
        }
        /* 选中状态：加粗 + 深色 */
        .category-nav-link.active {
            color: #333;
            font-weight: bold;
            background-color: rgba(0,0,0,0.05);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .category-nav-link {
                padding: 5px 10px;
                font-size: 14px;
            }
            
            .pb-4 {
                padding-bottom: 1.0rem !important;
            }
            .mb-4 {
                margin-bottom: 1.0rem !important;
            }
            /* 删除了 flex-direction: column，让其保持默认的 flex-row（左右排列） */
            .avatar-sm {
                width: 120px; /* 缩小图片宽度以适应屏幕 */
                height: 82px; /* 缩小图片高度 */
                margin-bottom: 0; /* 移除底部外边距 */
                border-radius: 0.3rem;
            }
            .article-content {
                padding-left: 10px !important; /* 缩小文字区域距离左侧图片的间距 */
            }
            .blog-post-title {
                font-size: 0.92rem; /* 移动端标题稍微缩小一点 */
                margin-bottom: 1px;
                -webkit-line-clamp: 1;
                display: -webkit-box;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .article-summary {
                -webkit-line-clamp: 2; /* 移动端空间有限，摘要最多显示2行 */
                font-size: 13px;
            }
            .blog-post-meta {
                font-size: 0.6rem;
                margin-bottom: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="container my-4" style="min-height: 60vh;">
        <div class="main-box">
               <div class="main-box mb-3" style="box-shadow: 0px 1px 0px rgb(0 0 0 / 9%);">
                <h5 class="mb-0" style="font-weight: 600;">
                    <i class="far fa-newspaper me-2" style="color: var(--luna-primary-blue);"></i>文章教程
                </h5>
              </div>
            <div class="card-body p-0">
                
                <nav class="nav d-flex flex-wrap align-items-center mb-3" id="article-category-nav">
                    <a class="category-nav-link active" href="javascript:void(0);" onclick="filterArticles('all', this)">全部</a>
                    <span class="p-2 text-muted small" id="cat-loading">加载分类...</span>
                </nav>
                
                <hr class="my-4" style="border-top: 1px solid #eee;">
                
                <div class="blog-content" id="article-list-container">
                    <div class="text-center py-5">
                        <i class="fas fa-spinner fa-spin text-muted fa-2x"></i>
                        <p class="text-muted mt-2">正在加载文章...</p>
                    </div>
                </div>

                <div class="mt-4" id="pagination-container"></div>

            </div>
        </div>

    </div>

    <script src="/assets/jquery-3.6.0.min.js"></script>
    <script src="/assets/bootstrap.bundle.min.js"></script>
    <script src="/files/header.js"></script>
    <script src="/files/footer.js"></script>
    <script>
    // 全局变量存储数据
    let g_allArticles = [];
    let g_articleCategories = [];
    let currentList = []; // 当前筛选条件下的列表
    let currentPage = 1;  // 当前页码
    const pageSize = 10;  // 每页显示10个

    $(document).ready(function() {
        loadGlobalConfig();
        loadPageArticleCategories();
        loadArticles();
    });

    // 加载全局配置并渲染页头页尾
    function loadGlobalConfig() {
        $.ajax({
            url: '/api/shop/config',
            method: 'GET',
            success: function(res) {
                let config = (res && res.data) ? res.data : (res || {});
                const siteName = config.site_name || '文章教程';
                const showSiteLogo = (config.show_site_logo == '1' || config.show_site_logo === true);
                const siteLogo = showSiteLogo ? (config.site_logo || '') : '';
                const showName = config.show_site_name;

                if (typeof renderHeader === 'function') renderHeader(siteName, siteLogo, showName);
                if (typeof renderFooter === 'function') renderFooter(siteName);
            },
            error: function() {
                if (typeof renderHeader === 'function') renderHeader('文章教程');
            }
        });
    }

    // 1. 加载分类
    function loadPageArticleCategories() {
        $.ajax({
            url: '/api/shop/article/categories',
            method: 'GET',
            success: function(res) {
                $('#cat-loading').remove();
                const nav = $('#article-category-nav');
                
                if (res && Array.isArray(res)) {
                    g_articleCategories = res;
                    const urlParams = new URLSearchParams(window.location.search);
                    const targetCatId = urlParams.get('category_id');
                    if (targetCatId) {
                        $('.category-nav-link').removeClass('active'); 
                    }
                    res.forEach(cat => {
                        const isActive = (targetCatId && cat.id == targetCatId) ? 'active' : '';
                        const html = `<a class="category-nav-link ${isActive}" href="javascript:void(0);" onclick="filterArticles(${cat.id}, this)">${cat.name}</a>`;
                        nav.append(html);
                    });
                }
            },
            error: function() {
                $('#cat-loading').text('分类加载失败');
            }
        });
    }

    // 2. 加载文章
    function loadArticles() {
        $.ajax({
            url: '/api/shop/articles/list',
            method: 'GET',
            success: function(res) {
                if (res && Array.isArray(res)) {
                    g_allArticles = res;
                    const urlParams = new URLSearchParams(window.location.search);
                    const targetCatId = urlParams.get('category_id');
                    
                    if (targetCatId) {
                        currentList = g_allArticles.filter(item => item.category_id == targetCatId);
                    } else {
                        currentList = res;
                    }
                    currentPage = 1;
                    renderArticles(currentList, currentPage);
                } else {
                    $('#article-list-container').html('<div class="text-center py-5 text-muted">暂无文章数据</div>');
                }
            },
            error: function() {
                $('#article-list-container').html('<div class="text-center py-5 text-danger">加载失败，请刷新重试</div>');
            }
        });
    }

    // 3. 渲染文章列表
    // 【修正点】：增加 page 参数，默认为 1
    function renderArticles(articles, page = 1) {
        currentPage = page;
        const container = $('#article-list-container');
        container.empty();

        if (articles.length === 0) {
            container.html('<div class="text-center py-5 text-muted">该分类下暂无文章</div>');
            $('#pagination-container').empty(); // 没数据时清空分页组件
            return;
        }

        const totalPages = Math.ceil(articles.length / pageSize);
        const paginatedArticles = articles.slice((currentPage - 1) * pageSize, currentPage * pageSize);

        // 【修正点】：循环遍历切割好的 paginatedArticles，而不是所有的 articles
        paginatedArticles.forEach(article => {
            const coverImg = article.cover_image || '/assets/noimage.jpg';
            const date = new Date(article.created_at * 1000).toLocaleString('zh-CN', { hour12: false }); 
            const summary = article.snippet || '暂无摘要';
            const link = `/article?id=${article.id}`;

            const itemHtml = `
                <div class="article-item d-flex mb-4 pb-4 border-bottom" style="animation: fadeIn 0.5s;">
                    <div class="flex-shrink-0">
                        <a href="${link}" class="d-block">
                            <img src="${coverImg}" class="avatar-sm shadow-sm" alt="${escapeHtml(article.title)}" loading="lazy" onerror="this.src='/assets/noimage.jpg'; this.onerror=null;">
                        </a>
                    </div>
                    
                    <div class="article-content flex-grow-1 ps-4" style="min-width: 0;">
                        <div class="blog-post-header">
                            <a class="blog-post-title" href="${link}">
                                ${article.is_notice ? '<span class="badge bg-danger me-1" style="font-size:12px;vertical-align:text-bottom;">置顶</span>' : ''}
                                ${escapeHtml(article.title)}
                            </a>
                            <div class="blog-post-meta">
                                <i class="far fa-clock me-1"></i> ${date}
                                <span class="mx-2">|</span>
                                <i class="far fa-eye me-1"></i> ${article.view_count || 0} 阅读
                            </div>
                        </div>
                        
                        <p class="article-summary">
                            ${escapeHtml(summary)}
                        </p>
                    </div>
                </div>
            `;
            container.append(itemHtml);
        });
        
        container.find('.article-item:last').removeClass('border-bottom pb-4');

        let pageHtml = '';
        if (totalPages > 1) {
            pageHtml += '<div class="xyfk-pagination">';
            pageHtml += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="renderArticles(currentList, 1); window.scrollTo(0,0);">首页</button>`;
            pageHtml += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="renderArticles(currentList, ${currentPage - 1}); window.scrollTo(0,0);">上一页</button>`;
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                pageHtml += `<button class="${i === currentPage ? 'active' : ''}" onclick="renderArticles(currentList, ${i}); window.scrollTo(0,0);">${i}</button>`;
            }
            pageHtml += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="renderArticles(currentList, ${currentPage + 1}); window.scrollTo(0,0);">下一页</button>`;
            pageHtml += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="renderArticles(currentList, ${totalPages}); window.scrollTo(0,0);">尾页</button>`;
            pageHtml += `<span class="page-info">${currentPage}/${totalPages}</span>`;
            pageHtml += '</div>';
        }
        $('#pagination-container').html(pageHtml);
    }

    // 4. 分类筛选
    window.filterArticles = function(catId, btn) {
        $('.category-nav-link').removeClass('active');
        $(btn).addClass('active');
        currentList = (catId === 'all') ? g_allArticles : g_allArticles.filter(item => item.category_id == catId);
        currentPage = 1;
        renderArticles(currentList, currentPage);
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
</script>
    
    <style>
        .xyfk-pagination { display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap; }
        .xyfk-pagination button { padding: 6px 14px; border: 1px solid #f0f0f0; background: #f4f4f4; color: #666; cursor: pointer; border-radius: 2px; font-size: 14px; transition: all 0.2s; outline: none; margin: 0; }
        .xyfk-pagination button:hover:not(:disabled) { background: #e8e8e8; }
        .xyfk-pagination button.active { background: #409EFF; color: #fff; border-color: #409EFF; }
        .xyfk-pagination button:disabled { color: #bbb; cursor: not-allowed; background: #fafafa; }
        .xyfk-pagination .page-info { padding: 6px 12px; color: #888; font-size: 14px; background: #f4f4f4; border: 1px solid #f0f0f0; border-radius: 2px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
