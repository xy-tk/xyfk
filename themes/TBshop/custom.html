<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/all.min.css" rel="stylesheet">
    <link href="/themes/TBshop/files/custom-theme.css" rel="stylesheet">
    <link href="/files/xytext.css" rel="stylesheet">
    <script src="/themes/TBshop/files/common.js" defer></script>
</head>
<body>
    <header class="mobile-header d-lg-none" id="global-mobile-header"></header>
    <div class="mobile-sidebar d-lg-none" id="mobile-sidebar"></div>
    <div class="mobile-overlay d-lg-none" id="mobile-overlay" onclick="togglePanel('mobile-sidebar', 'mobile-overlay')"></div>
    <header class="tb-header d-none d-lg-block" id="global-pc-header"></header>
    <div class="container mt-4">
        <div class="row gx-3" id="main-content-row">
            <div class="col-lg">
                
                <div class="module-box p-0 overflow-hidden" style="min-height: 600px;">
                    <div class="p-4 border-bottom bg-light bg-opacity-10">
                        <h4 class="fw-bold m-1 mt-3 text-center" id="article-title">加载中...</h4>
                    </div>                 
                    <div class="py-4 px-5">
                        <div id="article-content">
                            <div class="text-center py-5"><i class="fa fa-spinner fa-spin"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="site-footer" id="global-footer"></footer>
    <nav class="mobile-bottom-nav d-lg-none" id="global-mobile-nav"></nav>
    <script src="/assets/sticky-sidebar.min.js"></script>
    <script src="/assets/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 渲染公共页头、页尾和移动端导航
            if (typeof renderCommonLayout === 'function') {
                renderCommonLayout('custom'); 
            }

            // 2. 获取 URL 参数中的 alias 并请求内容数据
            const urlParams = new URLSearchParams(window.location.search);
            const alias = urlParams.get('alias');
            const titleEl = document.getElementById('article-title');
            const contentEl = document.getElementById('article-content');

            if (!alias) {
                titleEl.innerText = '参数错误';
                contentEl.innerHTML = '<div class="alert alert-danger text-center mt-4">访问链接不完整，缺少页面标识。</div>';
                return;
            }

            // 3. 发起数据请求
            fetch(`/api/shop/page/get?alias=${encodeURIComponent(alias)}`)
                .then(res => res.json())
                .then(res => {
                    if (res && res.title) {
                        // 如果有全局站点名称配置，可以在这里拼接
                        const siteNameStr = document.getElementById('header-site-name') ? '-' + document.getElementById('header-site-name').innerText : '';
                        document.title = res.title + siteNameStr;
                        
                        titleEl.innerText = res.title;
                        contentEl.innerHTML = res.content || '<p class="text-center text-muted mt-5">本页面暂无内容</p>';
                    } else {
                        document.title = '页面不存在';
                        titleEl.innerText = '页面不存在';
                        contentEl.innerHTML = '<div class="text-center py-5"><i class="fa fa-file-excel fs-1 text-muted mb-3"></i><p class="text-muted">抱歉，您访问的页面不存在或已被删除。</p><a href="/" class="btn btn-primary mt-3">返回首页</a></div>';
                    }
                })
                .catch(err => {
                    titleEl.innerText = '加载失败';
                    contentEl.innerHTML = '<div class="alert alert-danger text-center mt-4">网络请求失败，请稍后重试。</div>';
                });
        });
    </script>
</body>
</html>
